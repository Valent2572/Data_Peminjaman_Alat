<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Alat Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for industrial look */
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: #f8fafc;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
        }
        .btn-primary:hover::after {
            left: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 500;
            opacity: 0;
            z-index: 50;
            transform: translateY(100%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.success { background-color: #059669; border: 1px solid #10b981; }
        .toast.error { background-color: #dc2626; border: 1px solid #ef4444; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            width: 100%;
            max-width: 32rem;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        .loan-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
        }
        .loan-card:hover {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Top Right Menu -->
    <button id="openMenuBtn" class="fixed top-6 right-6 z-20 bg-slate-800/80 backdrop-blur border border-slate-700 text-slate-300 p-3 rounded-full hover:bg-slate-700 hover:text-white hover:border-slate-500 transition-all shadow-lg group">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
        <div class="absolute right-full mr-3 top-1/2 -translate-y-1/2 bg-slate-800 border border-slate-700 text-sm py-1.5 px-3 rounded-lg opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity whitespace-nowrap shadow-xl">
            Peminjaman Aktif
        </div>
    </button>

    <!-- Decorator grid background -->
    <div class="fixed inset-0 pointer-events-none" style="background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 30px 30px;"></div>

    <div class="glass-panel w-full max-w-md rounded-2xl p-8 relative overflow-hidden z-10">
        <!-- Top Accent Line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-cyan-400 to-blue-600"></div>
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 border border-slate-700 mb-4">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-slate-100 uppercase">Lab System</h1>
            <p class="text-sm text-slate-400 mt-1 font-medium">Log Peminjaman Alat</p>
        </div>

        <form id="loanForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">No Coin Mahasiswa</label>
                <div class="flex items-center gap-2">
                    <select id="coin_symbol" class="input-field w-2/5 px-3 py-3 rounded-lg cursor-pointer appearance-none text-center">
                        <option value="α">Alpha (α)</option>
                        <option value="β">Beta (β)</option>
                        <option value="δ" selected>Delta (δ)</option>
                        <option value="θ">Theta (θ)</option>
                    </select>
                    <span class="text-slate-400 font-bold">-</span>
                    <input type="text" id="coin_number" inputmode="numeric" required placeholder="Contoh: 0114" 
                        class="input-field flex-1 px-4 py-3 rounded-lg placeholder-slate-500" autocomplete="off">
                </div>
            </div>

            <div>
                <label for="kode_alat" class="block text-sm font-semibold text-slate-300 mb-2">Kode Alat</label>
                <input type="text" id="kode_alat" name="kode_alat" required placeholder="Contoh: AVO-01" 
                    class="input-field w-full px-4 py-3 rounded-lg placeholder-slate-500" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn" class="btn-primary w-full py-3.5 px-4 rounded-lg font-bold text-white flex items-center justify-center gap-3 mt-8">
                <span id="btnText">Pinjam Alat</span>
                <span id="btnLoader" class="loader hidden"></span>
            </button>
        </form>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <svg id="toastIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
        <span id="toastMessage"></span>
    </div>

    <!-- Modal Peminjaman Aktif -->
    <div id="activeLoansModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-500/20 rounded-lg text-blue-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-100">Peminjaman Aktif</h2>
                </div>
                <button id="closeModalBtn" class="text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-700 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEBHOOK GOOGLE APPS SCRIPT ANDA DI BAWAH INI
        const GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbwgkp2rU1AQg4ONWRpkzTStw_gI_4qJrPmomhj6z6YU548S1PuCGhvXUlZNNHpg4ho/exec'; 

        const form = document.getElementById('loanForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toast.className = 'toast show success';
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
            } else {
                toast.className = 'toast show error';
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.textContent = 'Memproses...';
                btnLoader.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btnText.textContent = 'Pinjam Alat';
                btnLoader.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!GAS_WEBHOOK_URL) {
                showToast('Error: Webhook URL belum diisi di kode', 'error');
                return;
            }

            const coinSymbol = document.getElementById('coin_symbol').value;
            const coinNumber = document.getElementById('coin_number').value.trim();
            const noCoin = `${coinSymbol}-${coinNumber}`;
            const kodeAlat = document.getElementById('kode_alat').value.trim();
            
            // Generate presisi timestamp (YYYY-MM-DDTHH:mm:ss.sssZ)
            const timestamp = new Date().toISOString();

            const payload = {
                timestamp: timestamp,
                no_coin: noCoin,
                kode_alat: kodeAlat
            };

            setLoading(true);

            try {
                // Menggunakan mode: 'no-cors' untuk menghindari blokade CORS preflight dari browser.
                // Request dikirim sebagai text/plain agar GAS tidak memblokir OPTIONS request, 
                // namun payload tetap berupa string JSON yang diparsing di backend.
                const response = await fetch(GAS_WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                // Karena mode 'no-cors', status akan selalu 0 dan tipe opaque.
                // Kita menganggap berhasil jika request selesai tanpa masuk ke catch.
                showToast('Peminjaman berhasil dicatat!', 'success');
                form.reset();
                document.getElementById('coin_number').focus();
            } catch (error) {
                console.error('Error:', error);
                showToast('Gagal mencatat peminjaman. Periksa koneksi Anda.', 'error');
            } finally {
                setLoading(false);
            }
        });

        // ==========================================
        // Modal & Fetch Data Logic
        // ==========================================
        const openMenuBtn = document.getElementById('openMenuBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const activeLoansModal = document.getElementById('activeLoansModal');
        const modalBody = document.getElementById('modalBody');

        openMenuBtn.addEventListener('click', () => {
            activeLoansModal.classList.add('active');
            fetchActiveLoans();
        });

        closeModalBtn.addEventListener('click', () => {
            activeLoansModal.classList.remove('active');
        });

        activeLoansModal.addEventListener('click', (e) => {
            if (e.target === activeLoansModal) {
                activeLoansModal.classList.remove('active');
            }
        });

        function formatDateTime(isoString) {
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return isoString;
            return date.toLocaleString('id-ID', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function fetchActiveLoans() {
            modalBody.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12 text-slate-400">
                    <span class="loader w-8 h-8 mb-4 border-t-blue-500"></span>
                    <p class="font-medium">Mengambil data dari server...</p>
                </div>
            `;
            
            try {
                // Gunakan GET request standar. 
                // GAS membolehkan CORS dari respon doGet yang me-redirect output JSON.
                const response = await fetch(GAS_WEBHOOK_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const result = await response.json();
                
                if (result.status === 'success') {
                    renderActiveLoans(result.data);
                } else {
                    throw new Error(result.message || 'Unknown error');
                }
            } catch (error) {
                console.error(error);
                modalBody.innerHTML = `
                    <div class="text-center py-8 text-red-400 bg-red-500/10 rounded-xl border border-red-500/20">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-medium px-4">Gagal memuat data.</p>
                        <p class="text-sm mt-2 opacity-80 px-4">Pastikan Anda telah mengupdate Code.gs dan men-Deploy ulang Apps Script sebagai versi baru.</p>
                    </div>
                `;
            }
        }

        function renderActiveLoans(loans) {
            if (!loans || loans.length === 0) {
                modalBody.innerHTML = `
                    <div class="text-center py-12 text-slate-400 border-2 border-dashed border-slate-700 rounded-xl">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p class="font-medium">Tidak ada alat yang sedang dipinjam.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            loans.forEach(loan => {
                html += `
                    <div class="loan-card">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-blue-400 text-lg flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    ${loan.kode_alat}
                                </h3>
                            </div>
                            <span class="text-xs bg-emerald-500/20 text-emerald-400 px-2.5 py-1 rounded border border-emerald-500/30 font-medium">Aktif Dipinjam</span>
                        </div>
                        <div class="space-y-1.5 text-sm bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                            <p class="text-slate-200 flex justify-between">
                                <span class="text-slate-500">Peminjam</span> 
                                <span class="font-medium text-right">${loan.nama} <span class="text-blue-400 text-xs ml-1">(${loan.no_coin})</span></span>
                            </p>
                            <p class="text-slate-200 flex justify-between">
                                <span class="text-slate-500">Waktu</span> 
                                <span class="font-medium">${formatDateTime(loan.timestamp)}</span>
                            </p>
                        </div>
                    </div>
                `;
            });
            modalBody.innerHTML = html;
        }
    </script>
</body>
</html>
